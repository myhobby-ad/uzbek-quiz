<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Level Quiz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0a0e14; --card: #161b22; --text: #e6edf3; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 2rem; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: transparent; color: var(--primary); border: 2px solid var(--primary); padding: 12px; margin: 8px 0; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: var(--primary); color: var(--bg); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .hidden { display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        #question-num { color: var(--primary); font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div id="menu">
            <h2 style="color: var(--primary)">Darajani tanlang</h2>
            <p>O'zingizga mos testni tanlang:</p>
            <div class="grid">
                <button class="btn" onclick="startQuiz('A1')">A1</button>
                <button class="btn" onclick="startQuiz('A2')">A2</button>
                <button class="btn" onclick="startQuiz('B1')">B1</button>
                <button class="btn" onclick="startQuiz('B2')">B2</button>
                <button class="btn" onclick="startQuiz('C1')">C1</button>
                <button class="btn" onclick="startQuiz('C2')">C2</button>
            </div>
        </div>

        <div id="quiz" class="hidden">
            <div id="question-num"></div>
            <h3 id="question-text" style="margin-bottom: 25px;"></h3>
            <div id="options-container"></div>
        </div>
    </div>

   <script src="data/questions.js"></script>
    <script src="quiz_logic.js?v=1.1"></script>
</body>
</html>
