<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uzbek Quiz Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00ff41;
            --panel: #151515;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #quiz-container {
            width: 100%;
            max-width: 400px;
        }

        header {
            margin-bottom: 30px;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            width: 100%;
        }

        h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; text-transform: uppercase; }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #222;
            margin: 20px 0;
            position: relative;
        }

        #progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-box {
            background: var(--panel);
            padding: 25px;
            border-radius: 2px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .options-list { display: flex; flex-direction: column; gap: 10px; }

        .option-btn {
            background: transparent;
            border: 1px solid #444;
            color: white;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-btn:active {
            background: var(--accent);
            color: black;
        }

        .hidden { display: none; }

        #result-screen { text-align: center; padding: 40px 0; }
        .score-text { font-size: 3rem; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div id="quiz-container">
    <header>
        <h1 id="title">QUIZ_MISSION</h1>
        <div id="user-display" style="font-size: 0.7rem; opacity: 0.6;">IDENTIFYING...</div>
    </header>

    <div id="game-screen">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div class="question-box">
            <p id="question">Yuklanmoqda...</p>
        </div>
        <div class="options-list" id="options"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>MISSION_COMPLETE</h2>
        <div class="score-text" id="final-score">0/0</div>
        <p>Natijangiz botga yuborilmoqda...</p>
        <button onclick="finishQuiz()" style="margin-top:20px; background:var(--accent); padding:15px; border:none; width:100%; font-weight:bold;">YOPISH</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const questions = [
        { q: "Python-da ro'yxat qaysi qavs bilan yaratiladi?", a: ["[ ]", "{ }", "( )", "< >"], correct: 0 },
        { q: "Vercel nima uchun ishlatiladi?", a: ["Dizayn", "Hosting", "3D Modeling", "Video tahrir"], correct: 1 },
        { q: "3ds Max qaysi yo'nalishga tegishli?", a: ["Backend", "Frontend", "3D Design", "Mobile App"], correct: 2 }
    ];

    let currentIdx = 0;
    let score = 0;

    function init() {
        if (tg.initDataUnsafe.user) {
            document.getElementById('user-display').innerText = `OPERATOR: ${tg.initDataUnsafe.user.first_name}`;
        }
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('question').innerText = q.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `> ${opt}`;
            btn.onclick = () => checkAnswer(i);
            optionsDiv.appendChild(btn);
        });

        document.getElementById('progress-fill').style.width = `${(currentIdx / questions.length) * 100}%`;
    }

    function checkAnswer(idx) {
        tg.HapticFeedback.impactOccurred('light');
        if (idx === questions[currentIdx].correct) score++;
        
        currentIdx++;
        if (currentIdx < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score}/${questions.length}`;
        
        // Natijani botga yuborish
        tg.sendData(JSON.stringify({
            score: score,
            total: questions.length,
            status: "completed"
        }));
    }

    function finishQuiz() {
        tg.close();
    }

    init();
</script>
</body>
</html>
