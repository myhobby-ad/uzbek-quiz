<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quiz Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0a0e14;
            --card: #161b22;
            --text: #e6edf3;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #30363d;
        }
        .btn {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px 20px;
            margin: 10px 0;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:hover {
            background: var(--primary);
            color: var(--bg);
        }
        #question-num { color: var(--primary); font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container" id="quiz-container">
        <div id="question-num">Savol 1/20</div>
        <h2 id="question-text">Yuklanmoqda...</h2>
        <div id="options-container"></div>
    </div>
<script src="script.js?v=1"></script>
 <script src="script.js?v=2"></script>
<script src="script.js?v=3"></script>
<script src="script.js?v=999"></script>
<script src="english.js"></script>
</body>
</html>
